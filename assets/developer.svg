<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Desenvolvedor programando no computador">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00D4FF" stroke-width="0.5" opacity="0.12"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Floating code symbols -->
  <g font-family="JetBrains Mono, Consolas, monospace" font-weight="bold">
    <text x="90" y="90" fill="#00D4FF" font-size="26" opacity="0.55">
      &lt;/&gt;
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="660" y="95" fill="#00D4FF" font-size="30" opacity="0.5">
      { }
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="5s" repeatCount="indefinite"/>
    </text>
    <text x="710" y="370" fill="#00D4FF" font-size="22" opacity="0.55">
      ( )
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -12; 0 0" dur="3.5s" repeatCount="indefinite"/>
    </text>
    <text x="60" y="420" fill="#00D4FF" font-size="22" opacity="0.5">
      [ ]
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="4.5s" repeatCount="indefinite"/>
    </text>
    <text x="730" y="220" fill="#00D4FF" font-size="20" opacity="0.45">
      =&gt;
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="3.8s" repeatCount="indefinite"/>
    </text>
    <text x="50" y="220" fill="#00D4FF" font-size="20" opacity="0.45">
      ;;
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -7; 0 0" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="120" y="170" fill="#00D4FF" font-size="14" opacity="0.4">
      0101
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="4.2s" repeatCount="indefinite"/>
    </text>
    <text x="640" y="180" fill="#00D4FF" font-size="14" opacity="0.4">
      1010
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="3.6s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Desk lamp -->
  <g>
    <ellipse cx="200" cy="400" rx="90" ry="40" fill="url(#lampGlow)"/>
    <line x1="155" y1="400" x2="155" y2="335" stroke="#00D4FF" stroke-width="1.8"/>
    <line x1="155" y1="335" x2="190" y2="310" stroke="#00D4FF" stroke-width="1.8"/>
    <path d="M 184 316 L 205 290 L 222 305 L 200 332 Z" fill="#0a0a0a" stroke="#00D4FF" stroke-width="1.8"/>
    <circle cx="202" cy="318" r="3.5" fill="#00D4FF">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <rect x="140" y="398" width="30" height="6" rx="2" fill="#0a0a0a" stroke="#00D4FF" stroke-width="1.5"/>
  </g>

  <!-- Monitor frame -->
  <rect x="240" y="130" width="320" height="230" rx="8" fill="#0a0a0a" stroke="#00D4FF" stroke-width="2.5"/>

  <!-- Monitor screen -->
  <rect x="255" y="145" width="290" height="200" rx="3" fill="#000000"/>

  <!-- Screen ambient glow under monitor -->
  <rect x="240" y="360" width="320" height="40" fill="url(#screenGlow)" opacity="0.7"/>

  <!-- Terminal title bar -->
  <rect x="255" y="145" width="290" height="20" rx="3" fill="#1a1a1a"/>
  <circle cx="268" cy="155" r="3.5" fill="#ff5555"/>
  <circle cx="282" cy="155" r="3.5" fill="#f1fa8c"/>
  <circle cx="296" cy="155" r="3.5" fill="#50fa7b"/>
  <text x="538" y="159" fill="#666" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="end">~ Walker.java</text>

  <!-- Code lines with sequential typing animation (8s loop) -->
  <g font-family="JetBrains Mono, Consolas, monospace" font-size="11">
    <text x="265" y="187">
      <tspan fill="#6272a4">1  </tspan>
      <tspan fill="#ff79c6">public class</tspan>
      <tspan fill="#50fa7b"> Walker</tspan>
      <tspan fill="#f8f8f2"> {</tspan>
    </text>

    <text x="265" y="205" opacity="0">
      <tspan fill="#6272a4">2  </tspan>
      <tspan fill="#8be9fd">  String</tspan>
      <tspan fill="#f8f8f2"> nome</tspan>
      <tspan fill="#ff79c6"> = </tspan>
      <tspan fill="#f1fa8c">"Walker"</tspan>
      <tspan fill="#f8f8f2">;</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.10;0.11;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="265" y="223" opacity="0">
      <tspan fill="#6272a4">3  </tspan>
      <tspan fill="#8be9fd">  String</tspan>
      <tspan fill="#f8f8f2"> stack</tspan>
      <tspan fill="#ff79c6"> = </tspan>
      <tspan fill="#f1fa8c">"Java + Spring"</tspan>
      <tspan fill="#f8f8f2">;</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.22;0.23;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="265" y="241" opacity="0">
      <tspan fill="#6272a4">4  </tspan>
      <tspan fill="#8be9fd">  boolean</tspan>
      <tspan fill="#f8f8f2"> coding</tspan>
      <tspan fill="#ff79c6"> = </tspan>
      <tspan fill="#bd93f9">true</tspan>
      <tspan fill="#f8f8f2">;</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.34;0.35;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="265" y="259" opacity="0">
      <tspan fill="#6272a4">5</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.44;0.45;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="265" y="277" opacity="0">
      <tspan fill="#6272a4">6  </tspan>
      <tspan fill="#ff79c6">  void</tspan>
      <tspan fill="#50fa7b"> code</tspan>
      <tspan fill="#f8f8f2">() {</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.54;0.55;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="265" y="295" opacity="0">
      <tspan fill="#6272a4">7  </tspan>
      <tspan fill="#8be9fd">    System</tspan>
      <tspan fill="#f8f8f2">.out.</tspan>
      <tspan fill="#50fa7b">println</tspan>
      <tspan fill="#f8f8f2">(</tspan>
      <tspan fill="#f1fa8c">"☕ → code"</tspan>
      <tspan fill="#f8f8f2">);</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.68;0.69;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="265" y="313" opacity="0">
      <tspan fill="#6272a4">8  </tspan>
      <tspan fill="#f8f8f2">  }</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.82;0.83;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <text x="265" y="331" opacity="0">
      <tspan fill="#6272a4">9  </tspan>
      <tspan fill="#f8f8f2">}</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.92;0.93;1" dur="8s" repeatCount="indefinite"/>
    </text>

    <!-- Blinking cursor -->
    <rect x="282" y="338" width="6" height="11" fill="#00D4FF">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Monitor base/stand -->
  <rect x="385" y="360" width="30" height="35" fill="#0a0a0a" stroke="#00D4FF" stroke-width="1.8"/>
  <rect x="355" y="392" width="90" height="8" rx="2" fill="#0a0a0a" stroke="#00D4FF" stroke-width="1.8"/>

  <!-- Desk surface -->
  <rect x="80" y="400" width="640" height="6" fill="#0a0a0a" stroke="#00D4FF" stroke-width="1.5"/>
  <rect x="80" y="406" width="640" height="50" fill="#050505"/>

  <!-- Person (back view) — head and shoulders -->
  <g>
    <!-- Head -->
    <circle cx="400" cy="345" r="22" fill="#0a0a0a" stroke="#00D4FF" stroke-width="2"/>
    <!-- Hood top detail -->
    <path d="M 378 340 Q 380 326 400 322 Q 420 326 422 340" fill="none" stroke="#00D4FF" stroke-width="1.3" opacity="0.7"/>
    <!-- Shoulders / hoodie -->
    <path d="M 355 405 Q 355 380 380 370 L 420 370 Q 445 380 445 405 L 445 410 L 355 410 Z" fill="#0a0a0a" stroke="#00D4FF" stroke-width="2"/>
    <!-- Hood opening -->
    <path d="M 383 372 Q 400 366 417 372" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Arms reaching to keyboard with subtle typing motion -->
  <g>
    <path d="M 360 395 Q 365 405 380 415" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -1.5; 0 0" dur="0.35s" repeatCount="indefinite"/>
    </path>
    <path d="M 440 395 Q 435 405 420 415" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -1.5; 0 0" dur="0.4s" begin="0.18s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Keyboard on desk -->
  <rect x="335" y="412" width="130" height="14" rx="2" fill="#0a0a0a" stroke="#00D4FF" stroke-width="1.5"/>
  <g fill="#00D4FF" opacity="0.45">
    <rect x="342" y="416" width="6" height="6" rx="1"/>
    <rect x="352" y="416" width="6" height="6" rx="1"/>
    <rect x="362" y="416" width="6" height="6" rx="1"/>
    <rect x="372" y="416" width="6" height="6" rx="1"/>
    <rect x="382" y="416" width="6" height="6" rx="1"/>
    <rect x="392" y="416" width="6" height="6" rx="1"/>
    <rect x="402" y="416" width="6" height="6" rx="1"/>
    <rect x="412" y="416" width="6" height="6" rx="1"/>
    <rect x="422" y="416" width="6" height="6" rx="1"/>
    <rect x="432" y="416" width="6" height="6" rx="1"/>
    <rect x="442" y="416" width="6" height="6" rx="1"/>
    <rect x="452" y="416" width="6" height="6" rx="1"/>
  </g>

  <!-- Coffee cup with animated steam -->
  <g>
    <!-- Steam -->
    <path d="M 540 380 Q 543 370 540 360 Q 537 350 540 340" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.6" stroke-linecap="round">
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 552 382 Q 555 372 552 362 Q 549 352 552 342" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.4s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <!-- Cup body -->
    <path d="M 530 388 L 533 416 Q 533 421 538 421 L 555 421 Q 560 421 560 416 L 562 388 Z" fill="#0a0a0a" stroke="#00D4FF" stroke-width="1.5"/>
    <!-- Cup top rim -->
    <ellipse cx="546" cy="388" rx="16" ry="3.5" fill="#0a0a0a" stroke="#00D4FF" stroke-width="1.5"/>
    <!-- Coffee surface -->
    <ellipse cx="546" cy="388" rx="13.5" ry="2.5" fill="#00D4FF" opacity="0.35"/>
    <!-- Handle -->
    <path d="M 562 395 Q 572 395 572 403 Q 572 411 562 411" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
  </g>

  <!-- Mouse -->
  <ellipse cx="490" cy="420" rx="10" ry="6" fill="#0a0a0a" stroke="#00D4FF" stroke-width="1.3"/>
  <line x1="490" y1="420" x2="490" y2="414" stroke="#00D4FF" stroke-width="0.6" opacity="0.6"/>
</svg>
